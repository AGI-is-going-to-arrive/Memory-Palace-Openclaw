    <style>
/* ─────────────────────────────────────────────
   §1  DESIGN TOKENS
   ───────────────────────────────────────────── */
:root {
  /* Surfaces */
  --page: #f5f7f9;
  --panel: #ffffff;
  --panel-warm: #F8F4EE;
  --ink: #14181d;
  --ink-soft: #36404a;
  --muted: #64717d;
  --accent: #D14F3F;
  --accent-deep: #9F3327;
  --accent-soft: rgba(209,79,63,0.12);
  --warm: #E9DFD2;
  --warm-deep: #C7B7A0;
  --line: rgba(39,45,52,0.12);
  --line-strong: rgba(39,45,52,0.24);
  --ok: #2C855D;
  --warn: #9F6F2F;
  --error: #D14F3F;

  /* Typography */
  --f-display: "Fraunces", "Iowan Old Style", Georgia, serif;
  --f-sans:    "IBM Plex Sans", "PingFang SC", "Segoe UI", sans-serif;
  --f-mono:    "IBM Plex Mono", "SFMono-Regular", monospace;

  /* Type scale */
  --fs-00: 0.6875rem;
  --fs-0:  0.8125rem;
  --fs-1:  0.9375rem;
  --fs-2:  1rem;
  --fs-3:  1.125rem;
  --fs-4:  1.375rem;
  --fs-5:  1.75rem;
  --fs-6:  2.375rem;
  --fs-7:  clamp(2.75rem, 5.2vw, 4.5rem);

  /* Spacing */
  --sp-1: 0.25rem; --sp-2: 0.5rem; --sp-3: 0.75rem; --sp-4: 1rem;
  --sp-5: 1.5rem;  --sp-6: 2rem;   --sp-7: 3rem;    --sp-8: 4rem;
  --sp-9: 6rem;    --sp-10: 8rem;

  /* Radius */
  --r-sm: 6px; --r-md: 10px; --r-lg: 14px; --r-xl: 20px;

  /* Elevation */
  --shadow-sm: 0 1px 2px rgba(15,23,42,.04), 0 2px 8px rgba(15,23,42,.04);
  --shadow-md: 0 2px 6px rgba(15,23,42,.05), 0 12px 32px rgba(15,23,42,.06);

  /* Z-index */
  --z-nav: 40; --z-sticky: 50; --z-modal: 80; --z-toast: 90;

  /* Content width */
  --content: min(1480px, calc(100vw - var(--sp-6)));

  /* Motion */
  --ease: cubic-bezier(.25,1,.5,1);
  --ease-slow: cubic-bezier(.16,1,.3,1);
  --dur: 180ms;
}

/* ─────────────────────────────────────────────
   §2  RESET & BASE
   ───────────────────────────────────────────── */
*{box-sizing:border-box}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
body{margin:0;font-family:var(--f-sans);font-size:var(--fs-2);line-height:1.6;color:var(--ink);background:var(--page);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
img{display:block;max-width:100%;height:auto}
a{color:inherit}
code,pre{font-family:var(--f-mono)}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}

/* Skip link */
.skip-link{position:absolute;left:-9999px;top:var(--sp-2);z-index:var(--z-toast);background:var(--accent);color:#fff;padding:var(--sp-2) var(--sp-4);font-size:var(--fs-1);text-decoration:none;border-radius:var(--r-sm)}
.skip-link:focus{left:var(--sp-4)}

/* Focus rings */
.btn:focus-visible,a:focus-visible,button:focus-visible{outline:2px solid var(--accent);outline-offset:3px}

/* ─────────────────────────────────────────────
   §3  SHELL – GRID + RAIL + TOPBAR
   ───────────────────────────────────────────── */
.shell{display:grid;grid-template-columns:248px 1fr;min-height:100vh}

/* Rail */
.rail{position:sticky;top:0;height:100vh;width:248px;display:flex;flex-direction:column;background:var(--page);border-right:1.5px solid var(--ink);z-index:var(--z-nav);overflow-y:auto;overflow-x:hidden}
.rail-masthead{padding:var(--sp-5) var(--sp-5) var(--sp-4);border-bottom:1.5px solid var(--ink);position:relative}
.rail-masthead::after{content:"";position:absolute;left:0;right:0;bottom:-3px;border-top:0.5px solid var(--ink)}
.rail-logo-row{display:flex;align-items:center;gap:var(--sp-3)}
.rail-logomark{width:40px;height:40px;display:grid;place-items:center;border:1.5px solid var(--ink);border-radius:50%;font-size:1.25rem;background:var(--page);flex-shrink:0}
.rail-wordmark{font-family:var(--f-mono);font-size:var(--fs-00);letter-spacing:0.12em;text-transform:uppercase;color:var(--ink);font-weight:500}
.rail-stamp{display:inline-block;margin-top:var(--sp-2);font-family:var(--f-mono);font-size:var(--fs-00);letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);border:0.5px solid var(--ink);padding:2px var(--sp-2);background:var(--panel-warm)}

/* Rail nav */
.rail-nav{flex:1;padding:var(--sp-3) var(--sp-3) var(--sp-2);overflow-y:auto}
.rail-nav-group{margin-bottom:var(--sp-4)}
.rail-nav-group:last-child{margin-bottom:0}
.rail-nav-label{display:block;font-family:var(--f-mono);font-size:var(--fs-00);letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);padding:var(--sp-1) var(--sp-2);margin-bottom:var(--sp-1);border-bottom:0.5px solid var(--line)}
.rail-nav a{display:flex;align-items:baseline;gap:var(--sp-2);padding:var(--sp-1) var(--sp-2);text-decoration:none;font-family:var(--f-sans);font-size:var(--fs-1);color:var(--ink-soft);transition:background var(--dur) var(--ease)}
.rail-nav a:hover{background:var(--panel-warm);color:var(--ink)}
.rail-nav a[aria-current="true"]{background:var(--accent-soft);color:var(--accent-deep);font-weight:500}
.rail-nav a[aria-current="true"] .rom{color:var(--accent)}
.rom{font-family:var(--f-mono);font-size:var(--fs-00);color:var(--muted);min-width:1.5em;letter-spacing:0.04em}

/* Rail footer */
.rail-foot{margin-top:auto;padding:var(--sp-4) var(--sp-5);border-top:1.5px solid var(--ink)}
.locale-switch{display:flex;gap:var(--sp-2);margin-bottom:var(--sp-3)}
.locale-switch button{flex:1;height:2.25rem;border:0.5px solid var(--ink);background:var(--page);color:var(--muted);font-family:var(--f-mono);font-size:var(--fs-00);letter-spacing:0.12em;text-transform:uppercase;transition:var(--dur) var(--ease)}
.locale-switch button.active{background:var(--accent);border-color:var(--accent-deep);color:#fff}
.locale-switch button:hover{border-color:var(--ink);color:var(--ink)}
.rail-credit{font-size:var(--fs-00);color:var(--muted);line-height:1.55}

/* Topbar */
.topbar{position:sticky;top:0;z-index:var(--z-sticky);display:flex;align-items:center;gap:var(--sp-4);height:3.5rem;padding:0 var(--sp-6);border-bottom:0.5px solid var(--line);background:rgba(245,247,249,0.92);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
.crumb{font-family:var(--f-display);font-style:italic;font-size:var(--fs-0);color:var(--muted)}
.crumb .sep{margin:0 var(--sp-2);color:var(--line-strong)}
.crumb b{font-family:var(--f-display);font-style:normal;color:var(--ink);font-weight:500}
.topbar-actions{margin-left:auto;display:flex;align-items:center;gap:var(--sp-2)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:var(--sp-2);height:2rem;padding:0 var(--sp-4);font-size:var(--fs-0);font-weight:500;border:0.5px solid var(--ink);background:var(--page);color:var(--ink);font-family:var(--f-sans);letter-spacing:0.01em;text-decoration:none;transition:transform var(--dur) var(--ease),background var(--dur) var(--ease),color var(--dur) var(--ease),box-shadow var(--dur) var(--ease)}
.btn:hover{background:var(--ink);color:var(--page);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent-deep)}
.btn.primary:hover{background:var(--accent-deep)}
.btn.ghost{border-color:transparent;background:transparent;color:var(--muted)}
.btn.ghost:hover{background:var(--panel-warm);color:var(--ink)}

/* Main content area */
.main-col{min-width:0;display:flex;flex-direction:column}
#app{max-width:var(--content);margin:0 auto;padding:var(--sp-6) var(--sp-6) var(--sp-10);width:100%}

/* Mobile hamburger */
.hamburger{display:none;width:2.5rem;height:2.5rem;place-items:center;border:0.5px solid var(--ink);background:var(--page);cursor:pointer;flex-shrink:0}
.hamburger span{display:block;width:1rem;height:1.5px;background:var(--ink);position:relative}
.hamburger span::before,.hamburger span::after{content:"";display:block;width:1rem;height:1.5px;background:var(--ink);position:absolute;left:0}
.hamburger span::before{top:-5px}
.hamburger span::after{top:5px}
.rail-overlay{display:none;position:fixed;inset:0;background:rgba(20,24,29,0.4);z-index:calc(var(--z-nav) - 1)}

/* ─────────────────────────────────────────────
   §4  EDITORIAL TYPOGRAPHY HELPERS
   ───────────────────────────────────────────── */
h1,h2,h3,.lede,.hero-lede{text-wrap:pretty;text-wrap:balance;font-optical-sizing:auto}
.kicker{display:flex;align-items:center;gap:var(--sp-3);font-family:var(--f-mono);font-size:var(--fs-00);letter-spacing:0.15em;text-transform:uppercase;color:var(--accent-deep);margin-bottom:var(--sp-4)}
.kicker::after{content:"";flex:1;border-top:0.5px solid var(--ink)}
/* Manual .drop span kept: only 2 instances (overview + architecture), avoiding per-locale ::first-letter brittleness */
.drop{font-family:var(--f-display);font-weight:600;float:left;font-size:3.25rem;line-height:0.82;padding:var(--sp-1) var(--sp-3) 0 0;color:var(--accent)}
.eyebrow{font-family:var(--f-mono);font-size:var(--fs-00);letter-spacing:0.15em;text-transform:uppercase;color:var(--muted)}
.lede{font-family:var(--f-display);font-style:italic;font-size:var(--fs-3);color:var(--ink-soft);line-height:1.5;max-width:680px}

/* ─────────────────────────────────────────────
   §5  SECTION BASE
   ───────────────────────────────────────────── */
.ed-section{padding:var(--sp-8) 0;position:relative}
.ed-section + .ed-section{border-top:0.5px solid var(--line)}
.section-head{margin-bottom:var(--sp-6)}
.section-head h2{font-family:var(--f-display);font-weight:500;font-size:var(--fs-5);letter-spacing:-0.02em;margin:0 0 var(--sp-2);line-height:1.1}
.section-head .intro{color:var(--muted);font-size:var(--fs-1);line-height:1.7;max-width:720px}

/* ─────────────────────────────────────────────
   §6  HERO
   ───────────────────────────────────────────── */
.hero-section{padding:var(--sp-8) 0 var(--sp-7);border-bottom:2px solid var(--ink)}
.hero-grid{display:grid;grid-template-columns:1.15fr 0.85fr;gap:var(--sp-8);align-items:start}
.hero-copy{display:flex;flex-direction:column;gap:var(--sp-4)}
.hero-copy h1{font-family:var(--f-display);font-weight:500;font-size:var(--fs-7);line-height:0.96;letter-spacing:-0.04em;margin:0}
.hero-copy h1 em{font-style:italic;color:var(--accent);font-weight:500}
.hero-lede{font-size:var(--fs-3);color:var(--muted);line-height:1.5;max-width:620px}
.hero-lede code{font-size:var(--fs-1);background:rgba(15,23,42,0.06);padding:1px var(--sp-2);border-radius:4px}
.hero-ctas{display:flex;gap:var(--sp-3);flex-wrap:wrap;align-items:center}
.cli-hint{display:flex;align-items:center;gap:var(--sp-3);padding:var(--sp-2) var(--sp-4);border:0.5px solid var(--ink);background:var(--panel-warm);font-family:var(--f-mono);font-size:var(--fs-00);color:var(--ink-soft);margin-top:var(--sp-2)}
.cli-hint .dollar{color:var(--muted);user-select:none;margin-right:var(--sp-2)}
.cli-hint code{flex:1;overflow-x:auto;white-space:nowrap}
.cli-hint .copy{margin-left:auto;font-family:var(--f-mono);font-size:var(--fs-00);color:var(--accent-deep);cursor:pointer;border:0.5px solid var(--line);padding:2px var(--sp-2);background:var(--page);white-space:nowrap;transition:background var(--dur) var(--ease),color var(--dur) var(--ease)}
.cli-hint .copy:hover{background:var(--panel-warm);color:var(--ink)}

/* Hero stat cluster */
.stat-cluster{display:grid;grid-template-columns:1fr 1fr;gap:0;border:0.5px solid var(--ink)}
.stat-cell{padding:var(--sp-4) var(--sp-5);border-bottom:0.5px solid var(--ink);border-right:0.5px solid var(--ink)}
.stat-cell:nth-child(2n){border-right:0}
.stat-cell:nth-last-child(-n+2){border-bottom:0}
.stat-cell .stat-num{font-family:var(--f-display);font-weight:500;font-size:var(--fs-6);line-height:1;letter-spacing:-0.03em;color:var(--ink);font-variant-numeric:tabular-nums}
.stat-cell .stat-label{font-family:var(--f-mono);font-size:var(--fs-00);color:var(--muted);letter-spacing:0.08em;margin-top:var(--sp-1)}

/* Hero figure */
.hero-figure-wrap{margin-top:var(--sp-6);border-top:0.5px solid var(--ink);padding-top:var(--sp-4)}
.hero-figure-wrap img{width:100%;border:0.5px solid var(--line)}
.hero-figure-wrap .fig-caption{display:flex;align-items:baseline;gap:var(--sp-2);margin-top:var(--sp-2);font-family:var(--f-mono);font-size:var(--fs-00);color:var(--muted);letter-spacing:0.06em}

/* ─────────────────────────────────────────────
   §7  OVERVIEW SECTION
   ───────────────────────────────────────────── */
.overview-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:var(--sp-7)}
.overview-intro{font-size:var(--fs-2);line-height:1.75;color:var(--ink-soft)}
.overview-list{display:flex;flex-direction:column;gap:var(--sp-4)}
.overview-item{display:flex;gap:var(--sp-3);align-items:flex-start}
.overview-item .ov-num{font-family:var(--f-display);font-style:italic;font-size:var(--fs-1);color:var(--accent);min-width:2.5em;flex-shrink:0;padding-top:2px}
.overview-item h3{margin:0 0 var(--sp-1);font-family:var(--f-display);font-size:var(--fs-2);font-weight:500;letter-spacing:-0.01em}
.overview-item p{margin:0;font-size:var(--fs-1);color:var(--muted);line-height:1.6}
.overview-figure{margin-top:var(--sp-6);border:0.5px solid var(--line);background:var(--panel)}
.overview-figure img{width:100%}
.overview-figure figcaption{padding:var(--sp-3) var(--sp-4);font-size:var(--fs-0);color:var(--muted);border-top:0.5px solid var(--line)}

/* ─────────────────────────────────────────────
   §8  INSTALL SECTION
   ───────────────────────────────────────────── */
.pipeline-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border:0.5px solid var(--ink);margin-bottom:var(--sp-6)}
.pipeline-step{padding:var(--sp-4) var(--sp-4);border-right:0.5px solid var(--ink);position:relative}
.pipeline-step:last-child{border-right:0}
.pipeline-step .ps-num{font-family:var(--f-display);font-style:italic;font-weight:500;font-size:var(--fs-5);color:var(--accent);line-height:1}
.pipeline-step h3{font-family:var(--f-display);font-size:var(--fs-1);font-weight:500;margin:var(--sp-1) 0;letter-spacing:-0.01em}
.pipeline-step p{font-size:var(--fs-00);color:var(--muted);margin:0;line-height:1.5}

/* Install table */
.install-table{width:100%;border-collapse:collapse;font-family:var(--f-mono);font-size:var(--fs-0);margin:var(--sp-5) 0}
.install-table th{text-align:left;font-size:var(--fs-00);letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);padding:var(--sp-3) var(--sp-4);border-top:1.5px solid var(--ink);border-bottom:0.5px solid var(--ink);background:var(--panel-warm)}
.install-table td{padding:var(--sp-3) var(--sp-4);border-bottom:0.5px solid var(--line);vertical-align:top}
.install-table tr:nth-child(even) td{background:var(--panel-warm)}
.install-table tr:hover td{background:rgba(209,79,63,0.04)}

/* Code block */
.code-block{margin:var(--sp-4) 0;padding:var(--sp-4) var(--sp-5);overflow:auto;background:#10141a;color:#f5f7f9;font-family:var(--f-mono);font-size:var(--fs-0);line-height:1.7;border:0.5px solid var(--ink);position:relative}
.code-block .line-num{color:rgba(245,247,249,0.3);user-select:none;display:inline-block;min-width:2em;text-align:right;margin-right:var(--sp-4)}
.inline-note{padding:var(--sp-4) var(--sp-5);border-left:3px solid var(--accent);background:var(--panel-warm);font-size:var(--fs-1);color:var(--ink-soft);line-height:1.7;margin-top:var(--sp-4)}

/* ─────────────────────────────────────────────
   §9  USAGE SECTION
   ───────────────────────────────────────────── */
.usage-block{padding:var(--sp-6) 0;border-top:0.5px solid var(--line)}
.usage-block:first-child{border-top:0;padding-top:0}
.usage-inner{display:grid;grid-template-columns:2fr 1fr;gap:var(--sp-6);align-items:start}
.usage-inner h3{font-family:var(--f-display);font-size:var(--fs-4);font-weight:500;margin:0 0 var(--sp-3);letter-spacing:-0.01em}
.usage-inner p{font-size:var(--fs-1);color:var(--muted);line-height:1.7;margin:0}
.usage-fig{border:0.5px solid var(--line);background:var(--panel)}
.usage-fig img{width:100%}
.usage-fig figcaption{padding:var(--sp-2) var(--sp-3);font-size:var(--fs-00);color:var(--muted);border-top:0.5px solid var(--line);font-family:var(--f-mono)}

/* ─────────────────────────────────────────────
   §10  WHY / DESIGN RATIONALE
   ───────────────────────────────────────────── */
.why-list{display:grid;gap:0}
.why-item{display:grid;grid-template-columns:auto 1fr;gap:var(--sp-5);padding:var(--sp-5) 0;border-top:0.5px solid var(--line)}
.why-item:first-child{border-top:0;padding-top:0}
.why-num{font-family:var(--f-display);font-style:italic;font-size:var(--fs-5);color:var(--accent);min-width:3rem;padding-top:var(--sp-1);border-left:3px solid var(--accent);padding-left:var(--sp-4)}
.why-item h3{font-family:var(--f-display);font-size:var(--fs-3);font-weight:500;margin:0 0 var(--sp-2);letter-spacing:-0.01em}
.why-item .why-tag{display:inline-block;font-family:var(--f-mono);font-size:var(--fs-00);letter-spacing:0.18em;text-transform:uppercase;color:var(--accent-deep);margin-bottom:var(--sp-2)}
.why-item p{font-size:var(--fs-1);color:var(--muted);line-height:1.7;margin:0}

/* ─────────────────────────────────────────────
   §11  ARCHITECTURE
   ───────────────────────────────────────────── */
.arch-reader{display:grid;grid-template-columns:1fr 320px;gap:var(--sp-7)}
.arch-narrative{font-size:var(--fs-2);line-height:1.75;color:var(--ink-soft)}
.arch-narrative blockquote{margin:var(--sp-5) 0;padding:var(--sp-3) var(--sp-5);border-left:3px solid var(--accent);font-family:var(--f-display);font-style:italic;font-size:var(--fs-3);color:var(--ink);line-height:1.55}
.arch-narrative blockquote cite{display:block;font-size:var(--fs-0);color:var(--muted);font-style:normal;margin-top:var(--sp-2);font-family:var(--f-mono)}
.arch-legend{position:sticky;top:5rem;align-self:start;border-left:0.5px solid var(--line);padding-left:var(--sp-4)}
.arch-legend h4{font-family:var(--f-mono);font-size:var(--fs-00);letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin:0 0 var(--sp-3);padding-bottom:var(--sp-2);border-bottom:0.5px solid var(--line)}
.arch-legend-item{padding:var(--sp-2) 0;border-bottom:0.5px dotted var(--line)}
.arch-legend-item .al-tag{font-family:var(--f-mono);font-size:var(--fs-00);color:var(--accent-deep);letter-spacing:0.1em;text-transform:uppercase}
.arch-legend-item .al-title{font-size:var(--fs-1);font-weight:500;margin:var(--sp-1) 0 0}

      const LOCALE_KEY = "memory-palace-landing-locale";

      function assetPath(asset, locale) {
        return typeof asset === "string" ? asset : asset[locale];
      }

      function detectLocale() {
        const query = new URLSearchParams(window.location.search).get("lang");
        if (query === "zh" || query === "en") return query;
        const saved = window.localStorage.getItem(LOCALE_KEY);
        if (saved === "zh" || saved === "en") return saved;
        const langs = navigator.languages && navigator.languages.length
          ? navigator.languages
          : [navigator.language || "en"];
        return langs.some((lang) => String(lang).toLowerCase().startsWith("zh")) ? "zh" : "en";
      }

      let currentLocale = detectLocale();

      /* ─── Syntax-light JSON highlighter ─── */
      function highlightJSON(str) {
        // XSS: entity-escape MUST come before span wrapping
        const esc = str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
        return esc
          .replace(/(&quot;(?:[^&]|&(?!quot;))*&quot;)\s*:/g, '<span class="str">$1</span>:')
          .replace(/:\s*(&quot;(?:[^&]|&(?!quot;))*&quot;)/g, ': <span class="str">$1</span>')
          .replace(/(\/\/.*$)/gm, '<span class="cm">$1</span>')
          .replace(/\b(true|false|null)\b/g, '<span class="str">$1</span>');
      }

      /* ─── MAIN RENDER ─── */
      function renderPage() {
        const copy = CONTENT[currentLocale];
        const app = document.getElementById("app");
        const nav = document.getElementById("side-nav");
        const foot = document.getElementById("rail-foot");
        const metaDescription = document.querySelector('meta[name="description"]');
        const docsLink = document.getElementById("docs-link");

        document.title = copy.meta.title;
        metaDescription.setAttribute("content", copy.meta.description);
        document.documentElement.lang = currentLocale === "zh" ? "zh-CN" : "en";

        foot.textContent = copy.rail.foot;

        if (docsLink) {
          docsLink.href = currentLocale === 'zh' ? LINKS.readmeZh : LINKS.readmeEn;
        }

        /* Build grouped nav with Roman numerals */
        const groups = NAV_GROUPS[currentLocale];
        nav.innerHTML = groups.map(group => `
          <div class="rail-nav-group">
            <span class="rail-nav-label">${group.label}</span>
            ${group.items.map(idx => {
              const item = copy.nav[idx];
              return `<a href="#${item.id}" data-nav-id="${item.id}"><span class="rom">${ROMAN[idx]}</span>${item.label}</a>`;
            }).join('')}
          </div>
        `).join('');

        app.innerHTML = [
          renderHero(copy),
          renderOverview(copy),
          renderInstall(copy),
          renderUsage(copy),
          renderWhy(copy),
          renderArchitecture(copy),
          renderBenchmark(copy),
          renderAcl(copy),
          renderToolsDashboard(copy),
          renderNext(copy)
        ].join("");

        document.querySelectorAll("[data-locale]").forEach((button) => {
          const isActive = button.getAttribute("data-locale") === currentLocale;
          button.classList.toggle("active", isActive);
          button.setAttribute("aria-pressed", isActive ? "true" : "false");
        });

        initInteractions();
      }

      /* ─── INTERACTION LAYER ─── */
      let _scrollObs = null, _counterObs = null, _barObs = null;

      function initInteractions() {
        /* Cleanup previous observers to prevent memory leaks on locale switch */
        if (_scrollObs) _scrollObs.disconnect();
        if (_counterObs) _counterObs.disconnect();
        if (_barObs) _barObs.disconnect();

        /* Scrollspy */
        const sectionIds = ['overview','install','usage','why','architecture','benchmark','acl','tools-dashboard','next'];
        const crumbEl = document.getElementById('crumb-section');
        const navLinks = document.querySelectorAll('#side-nav a[data-nav-id]');

        const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        _scrollObs = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const id = entry.target.id;
              navLinks.forEach(link => {
                const isMatch = link.getAttribute('data-nav-id') === id;
                link.setAttribute('aria-current', isMatch ? 'true' : 'false');
              });
              if (crumbEl) {
                const copy = CONTENT[currentLocale];
                const navItem = copy.nav.find(n => n.id === id);
                if (navItem) crumbEl.textContent = navItem.label;
              }
            }
          });
        }, { rootMargin: '-20% 0px -70% 0px', threshold: 0 });

        sectionIds.forEach(id => {
          const el = document.getElementById(id);
          if (el) _scrollObs.observe(el);
        });
        const heroEl = document.getElementById('hero');
        if (heroEl) _scrollObs.observe(heroEl);

        /* Nav click + copy button handlers are now delegated at boot (see below) */

        /* Stat counter animation — requestAnimationFrame for smooth 60/120fps */
        if (!reducedMotion) {
          const statCells = document.querySelectorAll('[data-count-to]');
          _counterObs = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                const el = entry.target;
                const target = parseInt(el.getAttribute('data-count-to'), 10);
                if (isNaN(target)) return;
                let startTs = null;
                const dur = 1200;
                const tick = (ts) => {
                  if (!startTs) startTs = ts;
                  const p = Math.min((ts - startTs) / dur, 1);
                  const ease = 1 - Math.pow(1 - p, 3);
                  el.textContent = Math.floor(ease * target);
                  if (p < 1) { requestAnimationFrame(tick); }
                  else { el.textContent = target; }
                };
                requestAnimationFrame(tick);
                _counterObs.unobserve(el);
              }
            });
          }, { threshold: 0.3 });
          statCells.forEach(c => _counterObs.observe(c));
        }

        /* Benchmark bar animation */
        if (!reducedMotion) {
          const bars = document.querySelectorAll('.bench-bar-fill[data-animated="false"]');
          _barObs = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                entry.target.setAttribute('data-animated', 'true');
                _barObs.unobserve(entry.target);
              }
            });
          }, { threshold: 0.2 });
          bars.forEach(b => _barObs.observe(b));
        } else {
          document.querySelectorAll('.bench-bar-fill[data-animated="false"]').forEach(b => {
            b.setAttribute('data-animated', 'true');
          });
        }
      }

      /* ─── Mobile drawer with focus trap + inert ─── */
      const hamburgerBtn = document.getElementById('hamburger-btn');
      const railOverlay = document.getElementById('rail-overlay');
      const railAside = document.getElementById('rail-aside');
      const mainEl = document.getElementById('app').closest('.main-col');
      const topbarEl = document.querySelector('header.topbar');

      function openDrawer() {
        document.body.setAttribute('data-rail-open', '');
        hamburgerBtn.setAttribute('aria-expanded', 'true');
        if (mainEl) mainEl.setAttribute('inert', '');
        if (topbarEl) topbarEl.setAttribute('inert', '');
        const firstLink = railAside.querySelector('.rail-nav a');
        if (firstLink) {
          const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
          if (!reduced) firstLink.focus({ preventScroll: true });
          else firstLink.focus();
        }
      }

      function closeDrawer() {
        document.body.removeAttribute('data-rail-open');
        hamburgerBtn.setAttribute('aria-expanded', 'false');
        if (mainEl) mainEl.removeAttribute('inert');
        if (topbarEl) topbarEl.removeAttribute('inert');
        hamburgerBtn.focus();
      }

      function toggleDrawer() {
        document.body.hasAttribute('data-rail-open') ? closeDrawer() : openDrawer();
      }

      /* Tab-trap fallback for browsers without inert support */
      railAside.addEventListener('keydown', (e) => {
        if (e.key !== 'Tab' || !document.body.hasAttribute('data-rail-open')) return;
        const focusable = railAside.querySelectorAll('a[href],button:not([disabled]),[tabindex]:not([tabindex="-1"])');
        if (!focusable.length) return;
        const first = focusable[0], last = focusable[focusable.length - 1];
        if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
        else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
      });

      hamburgerBtn.addEventListener('click', toggleDrawer);
      railOverlay.addEventListener('click', closeDrawer);
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && document.body.hasAttribute('data-rail-open')) closeDrawer();
      });

      /* ─── Locale switch ─── */
      document.querySelectorAll("[data-locale]").forEach((button) => {
        button.addEventListener("click", () => {
          currentLocale = button.getAttribute("data-locale");
          window.localStorage.setItem(LOCALE_KEY, currentLocale);
          renderPage();
        });
      });

      /* ─── Keyboard shortcuts ─── */
      let pendingG = false;
      document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.key === 'g') { pendingG = true; setTimeout(() => { pendingG = false; }, 800); return; }
        if (pendingG) {
          pendingG = false;
          const map = { h: '#hero', i: '#install', b: '#benchmark' };
          const target = map[e.key];
          if (target) {
            const el = document.querySelector(target);
            if (el) el.scrollIntoView({ behavior: 'smooth' });
          }
        }
      });

      /* ─── Delegated event handlers (attached ONCE, survive re-renders) ─── */
      document.getElementById('side-nav').addEventListener('click', (e) => {
        const link = e.target.closest('a[data-nav-id]');
        if (!link) return;
        e.preventDefault();
        const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const target = document.querySelector(link.getAttribute('href'));
        if (target) {
          target.scrollIntoView({ behavior: reducedMotion ? 'auto' : 'smooth' });
          history.replaceState(null, '', link.getAttribute('href'));
        }
        document.body.removeAttribute('data-rail-open');
        hamburgerBtn.setAttribute('aria-expanded', 'false');
        hamburgerBtn.focus();
      });

      document.getElementById('app').addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-copy]');
        if (!btn) return;
        const code = btn.closest('.cli-hint, .code-block')?.querySelector('code');
        if (!code) return;
        const text = code.textContent;
        const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        function showFeedback(msg, dur) {
          const orig = btn.textContent;
          btn.textContent = msg;
          if (!reducedMotion) btn.style.transition = 'opacity 120ms ease';
          setTimeout(() => { btn.textContent = orig; }, dur || 1200);
        }
        function fallbackCopy() {
          try {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.cssText = 'position:fixed;left:-9999px;opacity:0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showFeedback('Copied');
          } catch (_) {
            showFeedback(currentLocale === 'zh' ? '复制失败' : 'Copy failed -- select manually', 1600);
          }
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text)
            .then(() => showFeedback('Copied'))
            .catch(fallbackCopy);
        } else {
          fallbackCopy();
        }
      });

      /* ─── Boot ─── */
      renderPage();
    </script>
  </body>
